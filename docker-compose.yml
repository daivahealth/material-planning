services:
  db:
    image: postgres:16-alpine
    container_name: matplan_db
    environment:
      POSTGRES_USER: matplan
      POSTGRES_PASSWORD: matplan
      POSTGRES_DB: matplan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matplan"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matplan_backend
    environment:
      DATABASE_URL: postgresql://matplan:matplan@db:5432/matplan
      PYTHONUNBUFFERED: "1"
      MINING_SECRET_KEY: "pIGqOca8iKkeGdeI8VTlJJvqcriKkECZv_cZs6IoVvo="
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh /app/start.sh

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: matplan_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
